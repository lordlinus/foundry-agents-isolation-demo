name: Deploy UI to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'ui/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp API_BASE into ui/config.js
        env:
          API_BASE: ${{ vars.API_BASE }}
        run: |
          if [ -z "$API_BASE" ]; then
            echo "::warning::Repo variable API_BASE is empty — UI will try same-origin /api which won't work on Pages. Set it under Settings → Secrets and variables → Actions → Variables."
            API_BASE=""
          fi
          cat > ui/config.js <<EOF
          // Generated by .github/workflows/pages.yml — do not edit by hand.
          window.API_BASE = "${API_BASE}";
          window.api = function (path) {
            const base = (window.API_BASE || "").replace(/\/+\$/, "");
            return base + path;
          };
          EOF
          echo "Stamped API_BASE=$API_BASE"

      - name: Make site root redirect to index.html
        run: |
          # GitHub Pages serves the directory as-is; add a tiny landing index
          # at the root that links the two demos. The actual app pages stay
          # at /index.html (multi-customer) and /demo.html (isolation).
          # We just upload ui/ wholesale so index.html is the default.
          ls ui/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui

      - id: deploy
        uses: actions/deploy-pages@v4
